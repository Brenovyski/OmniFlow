<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OmniFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand: #FACC15;
    --brand-press: #CA8A04;
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --surface-2: #F5F5F4;
    --border: #E7E5E4;
    --border-strong: #D6D3D1;
    --text: #0C0A09;
    --text-muted: #57534E;
    --text-faint: #A8A29E;
    --income: #15803D;
    --income-soft: #DCFCE7;
    --expense: #B91C1C;
    --expense-soft: #FEE2E2;
    --invest: #6D28D9;
    --invest-soft: #EDE9FE;
    --shadow-pop: 0 1px 2px rgba(12,10,9,.04), 0 8px 24px rgba(12,10,9,.08);
    --radius-card: 8px;
    --radius-input: 6px;
  }
  [data-theme="dark"] {
    --brand: #FFE066;
    --brand-press: #EAB308;
    --bg: #0B0F14;
    --surface: #141A21;
    --surface-2: #1A2129;
    --border: #1F2832;
    --border-strong: #2A3440;
    --text: #F5F5F4;
    --text-muted: #A8A29E;
    --text-faint: #6B7280;
    --income: #4ADE80;
    --income-soft: rgba(74,222,128,.12);
    --expense: #F87171;
    --expense-soft: rgba(248,113,113,.12);
    --invest: #A78BFA;
    --invest-soft: rgba(167,139,250,.14);
    --shadow-pop: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-feature-settings: "cv11", "ss01";
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  .display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .num { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Page */
  .app { display: grid; grid-template-columns: var(--sidebar-w, 248px) 1fr; min-height: 100vh; transition: grid-template-columns 220ms ease; }
  .app.collapsed { --sidebar-w: 64px; }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .brand-row { display: flex; align-items: center; gap: 10px; padding: 18px 16px; border-bottom: 1px solid var(--border); }
  .brand-mark { width: 36px; height: 36px; display: grid; place-items: center; flex: none; }
  .brand-mark img { width: 36px; height: 36px; object-fit: contain; }
  .brand-name { font-family: 'Space Grotesk'; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }
  .brand-sub { font-size: 11px; color: var(--text-faint); margin-top: -2px; }
  .nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
  .nav-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 14px 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 6px; color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 13.5px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; transition: background 120ms, color 120ms; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: color-mix(in oklab, var(--brand) 18%, transparent); color: var(--text); }
  [data-theme="dark"] .nav-item.active { background: color-mix(in oklab, var(--brand) 14%, transparent); }
  .nav-item.active .nav-ico { color: var(--brand-press); }
  [data-theme="dark"] .nav-item.active .nav-ico { color: var(--brand); }
  .nav-item.active::before { content:""; width: 3px; height: 18px; background: var(--brand); border-radius: 2px; position: absolute; margin-left: -10px; }
  .nav-item { position: relative; }
  .nav-ico { width: 18px; height: 18px; flex: none; color: var(--text-faint); }
  .nav-label { white-space: nowrap; overflow: hidden; flex: 1; }
  .nav-badge { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 999px; background: var(--surface-2); color: var(--text-muted); }
  .nav-badge.alert { background: var(--brand); color: #0C0A09; }

  .sidebar-foot { border-top: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; }
  .user-card:hover { background: var(--surface-2); }
  .avatar { width: 28px; height: 28px; border-radius: 999px; background: linear-gradient(135deg, var(--brand), var(--brand-press)); color: #0C0A09; font-weight: 700; font-size: 12px; display: grid; place-items: center; flex: none; }
  .user-name { font-weight: 600; font-size: 13px; }
  .user-meta { font-size: 11px; color: var(--text-faint); }

  .collapsed .nav-label, .collapsed .nav-badge, .collapsed .nav-section, .collapsed .brand-text, .collapsed .user-text, .collapsed .collapse-label { display: none; }
  .collapsed .nav-item { justify-content: center; padding: 9px; }
  .collapsed .nav-item.active::before { display: none; }
  .collapsed .brand-row { justify-content: center; padding: 18px 8px; }
  .collapsed .user-card { justify-content: center; padding: 8px; }

  /* Main */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 28px; border-bottom: 1px solid var(--border); background: color-mix(in oklab, var(--bg) 70%, transparent); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 5; }
  .icon-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--text-muted); display: grid; place-items: center; }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .search { flex: 1; max-width: 480px; display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-input); background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .search:hover { border-color: var(--border-strong); }
  .search .kbd { margin-left: auto; }
  .kbd { font-family: 'JetBrains Mono'; font-size: 10.5px; padding: 2px 6px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: var(--radius-input); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-weight: 500; font-size: 13px; transition: all 120ms; }
  .btn:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .btn.primary { background: var(--brand); color: #0C0A09; border-color: transparent; font-weight: 600; }
  .btn.primary:hover { background: var(--brand-press); color: #fff; }
  [data-theme="dark"] .btn.primary { color: #0C0A09; }
  [data-theme="dark"] .btn.primary:hover { color: #0C0A09; background: #FACC15; }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.ghost:hover { background: var(--surface-2); }

  .page { padding: 28px; max-width: 1480px; width: 100%; margin: 0 auto; flex: 1; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
  .page-title { font-family: 'Space Grotesk'; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; margin: 0; }
  .page-sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 24px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-weight: 600; font-size: 14px; }
  .card-sub { font-size: 12px; color: var(--text-faint); }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  .kpi { padding: 20px; }
  .kpi-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .kpi-dot { width: 6px; height: 6px; border-radius: 999px; }
  .kpi-value { font-family: 'Space Grotesk'; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; margin-top: 10px; line-height: 1.1; }
  .kpi-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; margin-top: 6px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .kpi-delta.up { color: var(--income); background: var(--income-soft); }
  .kpi-delta.down { color: var(--expense); background: var(--expense-soft); }
  .kpi-spark { margin-top: 14px; }

  /* Layout grid */
  .grid-2 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Money */
  .money { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .money.income { color: var(--income); }
  .money.expense { color: var(--expense); }
  .money.invest { color: var(--invest); }

  /* Source badge (account) */
  .src-badge { display: inline-flex; align-items: center; gap: 7px; padding: 3px 9px; border-radius: 999px; background: var(--surface-2); font-size: 12px; font-weight: 500; color: var(--text); border: 1px solid var(--border); }
  .src-dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }

  /* Calendar */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-h { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); padding: 6px; text-align: center; }
  .cal-d { aspect-ratio: 1/1; border: 1px solid var(--border); border-radius: 6px; padding: 6px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; background: var(--surface); transition: all 120ms; min-height: 56px; }
  .cal-d:hover { border-color: var(--border-strong); }
  .cal-d.muted-day { opacity: 0.35; }
  .cal-d.today { border-color: var(--brand); box-shadow: inset 0 0 0 1px var(--brand); }
  .cal-d.atypical { background: var(--expense-soft); border-color: var(--expense); }
  .cal-d.income-day { background: var(--income-soft); border-color: var(--income); }
  .cal-num { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .cal-amt { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 600; margin-top: auto; }

  /* Insight cards */
  .ins { display: flex; gap: 14px; padding: 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }
  .ins-ico { width: 36px; height: 36px; border-radius: 8px; display: grid; place-items: center; flex: none; }
  .ins-title { font-weight: 600; font-size: 13.5px; margin-bottom: 4px; }
  .ins-body { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }

  /* Transactions table */
  .tx-table { width: 100%; border-collapse: collapse; }
  .tx-table th { text-align: left; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); padding: 10px 8px; border-bottom: 1px solid var(--border); }
  .tx-table td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .tx-table tr:last-child td { border-bottom: none; }
  .tx-table tr.row-hover:hover td { background: var(--surface-2); }
  .tx-cat { display: inline-flex; align-items: center; gap: 8px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--surface-2); color: var(--text-muted); }
  .tx-cat-dot { width: 6px; height: 6px; border-radius: 999px; }
  .tx-type { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
  .tx-type-dot { width: 8px; height: 8px; border-radius: 2px; }
  .right { text-align: right; }
  .muted { color: var(--text-muted); }
  .faint { color: var(--text-faint); }

  /* Filter chips */
  .chip-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  [data-theme="dark"] .chip.active { background: var(--brand); color: #0C0A09; border-color: var(--brand); }

  /* Accounts list */
  .acct-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .acct-row:last-child { border-bottom: none; }
  .acct-ico { width: 36px; height: 36px; border-radius: 8px; background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted); flex: none; }
  .acct-name { font-weight: 600; font-size: 13.5px; }
  .acct-meta { font-size: 11.5px; color: var(--text-faint); }
  .acct-bal { margin-left: auto; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; }

  /* FAB */
  .fab { position: fixed; right: 28px; bottom: 28px; width: 52px; height: 52px; border-radius: 999px; background: var(--brand); color: #0C0A09; border: none; display: grid; place-items: center; box-shadow: var(--shadow-pop); transition: transform 120ms; z-index: 20; }
  .fab:hover { transform: translateY(-2px); background: var(--brand-press); color: #fff; }

  /* Command palette */
  .scrim { position: fixed; inset: 0; background: rgba(12,10,9,0.55); backdrop-filter: blur(4px); z-index: 50; display: grid; place-items: flex-start center; padding-top: 12vh; animation: fade 150ms ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .palette { width: min(92vw, 620px); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-pop); overflow: hidden; }
  .palette-input { width: 100%; padding: 16px 18px; border: none; outline: none; background: transparent; color: var(--text); font-family: inherit; font-size: 15px; border-bottom: 1px solid var(--border); }
  .palette-list { max-height: 360px; overflow-y: auto; padding: 6px; }
  .palette-section { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 10px 10px 4px; }
  .palette-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13.5px; }
  .palette-item:hover, .palette-item.sel { background: var(--surface-2); }
  .palette-item.sel { box-shadow: inset 2px 0 0 var(--brand); }
  .palette-item .pi-ico { width: 16px; height: 16px; color: var(--text-muted); }
  .palette-foot { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-faint); }

  /* Empty state with Volt */
  .empty { text-align: center; padding: 64px 20px; }
  .empty-volt { width: 140px; height: 140px; margin: 0 auto 20px; opacity: 0.95; }
  .empty-title { font-family: 'Space Grotesk'; font-weight: 600; font-size: 22px; margin: 0 0 8px; }
  .empty-sub { color: var(--text-muted); margin-bottom: 20px; }

  /* Charts (SVG) */
  .axis-label { font-size: 10.5px; fill: var(--text-faint); font-family: 'JetBrains Mono'; }
  .grid-line { stroke: var(--border); stroke-dasharray: 2 4; }

  /* Segmented */
  .seg { display: inline-flex; padding: 3px; background: var(--surface-2); border-radius: 7px; border: 1px solid var(--border); }
  .seg button { padding: 5px 11px; border-radius: 5px; border: none; background: transparent; color: var(--text-muted); font-weight: 500; font-size: 12.5px; }
  .seg button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(12,10,9,.06); }
  [data-theme="dark"] .seg button.on { background: var(--bg); }

  /* Login */
  .login-bg { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(ellipse at top, color-mix(in oklab, var(--brand) 12%, transparent), transparent 60%), var(--bg); padding: 24px; }
  .login-card { width: 100%; max-width: 380px; }
  .login-volt { width: 168px; height: 168px; margin: 0 auto 18px; display: block; }

  /* Dropdown */
  .menu { position: absolute; right: 0; top: calc(100% + 6px); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-pop); padding: 6px; min-width: 200px; z-index: 30; }
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 5px; font-size: 13px; cursor: pointer; color: var(--text); }
  .menu-item:hover { background: var(--surface-2); }
  .menu-sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* Toast */
  .toasts { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 60; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 8px; font-size: 13px; box-shadow: var(--shadow-pop); display: flex; align-items: center; gap: 10px; animation: slideUp 200ms ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/charts.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/transactions.jsx"></script>
<script type="text/babel" src="src/other-views.jsx"></script>
